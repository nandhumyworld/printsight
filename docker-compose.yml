services:
  postgres:
    image: postgres:16-alpine
    container_name: printsight-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-printsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-printsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-printsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - printsight-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: printsight-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-printsight}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-printsight}
    ports:
      - "8001:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - printsight-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: printsight-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - printsight-net

volumes:
  postgres_data:
networks:
  printsight-net:
    driver: bridge
